name: Code Security Scans

"on":
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 7 * * 5"

env:
  FORCE_COLOR: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_PYTHON_VERSION_WARNING: "1"

jobs:
  check_and_coverage-test:
    if: contains(github.event.pull_request.title, '[skip ci]') == false
    name: "Run security scans"
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install guarddog

      - name: Run guarddog
        shell: bash
        run: "python -m guarddog pypi scan ."

      - name: Run pip-audit
        uses: pypa/gh-action-pip-audit@v1.1.0
        with:
          inputs: ./requirements/constraints.txt ./requirements/base.txt
          # Pre-existing advisories tracked for a dedicated dep-bump PR:
          #   CVE-2026-32274 — black 24.4.2 → 26.3.1
          #   CVE-2025-71176 — pytest 8.3.4 → 9.0.3
          ignore-vulns: |
            CVE-2026-32274
            CVE-2025-71176
