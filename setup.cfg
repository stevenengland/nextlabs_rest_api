[black]
[flake8]
# Since wemake-python-styleguide 1.0.0:
select = WPS
# flake8 configuration:
# https://flake8.pycqa.org/en/latest/user/configuration.html
format = wemake
show-source = true
statistics = false
doctests = true
enable-extensions = G
exclude =
  .git,
  __pycache__,
  .venv,
  tools,
  .mypy_cache,
  .eggs,
  *.egg,
  tests/assets,
  .claude,
  .agents

# ── Complexity limits ──
# wemake defaults: max-complexity=10, max-cognitive-complexity=12
# init_project.sh can override these values.
max-complexity = 12
max-cognitive-complexity = 15

# ── Line length (matches black) ──
# https://black.readthedocs.io/en/stable/guides/using_black_with_other_tools.html
max-line-length = 120
extend-ignore = E203

# ── Module limits ──
max-module-expressions = 7
max-methods = 10
# WPS201: Too many imports in a module (wemake default: 12)
max-imports = 20


# Disable some pydocstyle checks:
ignore = D401, X100, W504, RST303, RST304, DAR103, DAR203,
# Do not enforce Docstring usage as it is no public library
         D100, D101, D102, D103, D104, D105, D106, D107
# Counterpart to black quoting (will automatically use convert to double quotes):
         Q000,
# f-string rules that are too strict:
         WPS305, WPS237
# Allow built in function in this project since it is a set of scripts only
         WPS421
# Allow many members since these scripts need to be self contained
         WPS202
# Allow more then 5 local vars in a function
         WPS210
# Allow == before a binary operator because black formatter sometimes does this
         W503
# Allow multiline conditions
         WPS337
# Allow dot beginning lines
         WPS348


# Docs: https://github.com/snoack/flake8-per-file-ignores
per-file-ignores =
  # Tests need relaxed rules — assert, magic numbers, long functions, etc.
  tests/*.py: S101, S105, WPS432, WPS114, WPS202, WPS210, WPS118, WPS226, WPS204, WPS218, WPS213, WPS221, WPS201, WPS229, WPS501, WPS232, WPS214, WPS230, WPS430, WPS402, WPS441, WPS437, WPS236, WPS110, WPS211, WPS111, WPS219, WPS520, WPS338

  # Add module-specific relaxations as needed. Examples:
  # src/nextlabs_sdk/orchestrator.py: WPS211, WPS234  # many args + deep imports
  # **/*_interface.py: WPS420, WPS463               # abstract methods

# darglint configuration:
# https://github.com/terrencepreilly/darglint
strictness = long
docstring-style = google

[isort]
# https://black.readthedocs.io/en/stable/guides/using_black_with_other_tools.html#isort
profile = black
# isort configuration:
# https://github.com/PyCQA/isort/wiki/isort-Settings
include_trailing_comma = true
use_parentheses = true
# See https://github.com/PyCQA/isort#multi-line-output-modes
multi_line_output = 3
line_length = 80

[mypy]
# Mypy configuration:
# https://mypy.readthedocs.io/en/latest/config_file.html
exclude = tests/assets

enable_error_code =
  truthy-bool,
  redundant-expr,
  unused-awaitable,
  ignore-without-code

allow_redefinition = false
check_untyped_defs = true
disallow_untyped_decorators = true
disallow_any_explicit = true
disallow_any_generics = true
disallow_untyped_calls = true
explicit_package_bases = true
ignore_errors = false
ignore_missing_imports = true
implicit_reexport = false
local_partial_types = true
strict_optional = true
strict_equality = true
show_error_codes = true
no_implicit_optional = true
warn_unused_ignores = true
warn_redundant_casts = true
warn_unused_configs = true
warn_unreachable = true
warn_no_return = true

# ── Uncomment if using Pydantic ──
plugins = pydantic.mypy

[pydantic-mypy]
init_typed = True

[mypy-tests.*]
disallow_any_explicit = false

# Per-module relaxations — add as your codebase grows:
# [mypy-src.nextlabs_sdk.models.*]
# disallow_any_explicit = false  # Pydantic models introduce Any

# Pydantic models — ConfigDict uses Any
[mypy-nextlabs_sdk._cloudaz._models]
disallow_any_explicit = false

# API response parsing functions return Any
[mypy-nextlabs_sdk._cloudaz._response]
disallow_any_explicit = false

[mypy-tests.test_cloudaz_models]
disallow_untyped_calls = false

[tool:pytest]
# pytest configuration:
# https://docs.pytest.org/en/stable/customize.html

# Timeout for tests, so they can not take longer
# than this amount of seconds.
# Configuration:
# https://pypi.org/project/pytest-timeout/
timeout = 5

# Strict `@xfail` by default:
xfail_strict = true

# Directories that are not visited by pytest collector:
norecursedirs = *.egg .eggs dist build docs .tox .git __pycache__ tools tests/assets

markers =
  e2e: end-to-end tests requiring Docker (deselect by default)

addopts =
  --strict-markers
  --strict-config
  --doctest-modules
  -m "not e2e"
  # Output:
  --tb=short
  # Coverage:
  --cov=src
  --cov=tests
  --cov-branch
  --cov-report=term-missing:skip-covered
  --cov-report=html
  --cov-report=xml
  # init_project.sh sets this value (default: 90)
  --cov-fail-under=90
  # redirect tmp creation to a custom directory
  # This is useful if running tests in a Docker container with Docker-outside-of-Docker filesystem
  --basetemp=./tests/test_temp

[coverage:run]
# Coverage configuration:
# https://coverage.readthedocs.io/en/latest/config.html
